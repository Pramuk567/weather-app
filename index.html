<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    
    <div class="card">
        <h2 class="heading">Well come to Weather App </h2>
        <div class="info">
            <h2 class="title">Pramukh Project</h2>
            <img src="images/1750066839575.jpg" alt="pramukh" >

        </div>
        <div class="search">
            <input type="search" placeholder="Enter city name" spellcheck="true">
            <button><img src="images/search.png" alt="search"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="weather">
            <img src="images/rain.png" class="weather-icon" alt="rain">
            <h2 class="temp"></h2>
            <h3 class="city"></h3>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="humidity">
                    <div>
                        <p class="humidity"></p>
                        <p>Humidity</p>
                    </div>
                </div>
                 <div class="col">
                    <img src="images/wind.png" alt="wind">
                    <div>
                        <p class="wind">km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js">

    </script>
</body>
</html>
